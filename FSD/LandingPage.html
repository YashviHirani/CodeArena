<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <style>
        body{
            padding: 70px 0 0 0;
            margin: 0px;
        }
        .bg-radial {
            background: radial-gradient(
            circle at center,
            #1a1a2e 10%,   /* dark navy transition */
            #000000 30%
);
            min-height: 100vh; /* full screen */
            display: flex;
            flex-direction: column; /* stack items vertically */
            align-items: stretch; 
          }
          .navbar {
            background-color: #0f0f1a;
            padding: 1rem 2rem;
          }
      
          .navbar-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: bold;
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb, #a084f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          }
      
          .nav-link {
            color: #cfcfe6 !important;
            font-weight: 500;
            margin-right: 1rem;
            transition: color 0.3s ease;
          }
      
          .nav-link:hover {
            color: #20c997 !important;
            text-shadow: 0 0 8px rgba(32, 201, 151, 0.5);
          }
          .btn-glow {
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 0.2s ease;
          }
      
          .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(160, 132, 245, 0.6);
          }
          .hero-section {
            padding: 100px 20px 60px;
          }
          
          .hero-heading {
            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
          }
          
          .word-master {
            background: linear-gradient(90deg, #b7fce7, #b5f0e5); /* Teal shades */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          
          .word-code {
            background: linear-gradient(90deg, #b7fce7, #b5f0e5); /* Indigo shades */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          
          .word-conquer {
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb); /* Violet shades */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          
          .word-challenges {
            background: linear-gradient(90deg,#4e54c8, #8f94fb, #a084f5); /* Orange to pink */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          
          .hero-subtext {
            font-size: 1.1rem;
            color: #cfcfe6;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
          }
          
          .btn-glow-1{
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb);
            color: white;
            border: none;
            padding: 0.6rem 1.4rem;
            font-weight: bold;
            border-radius: 6px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
          }
          
          .btn-glow-1:hover {
            transform: scale(1.05);
            box-shadow: 0 0 12px rgba(160, 132, 245, 0.6);
          }          
          
    </style>
</head>
<body>
    <div class="bg-radial">
        <nav class="navbar navbar-expand-lg fixed-top">
            <div class="container-fluid">
              <a class="navbar-brand" href="#">CodeArena</a>
              <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                  <li class="nav-item"><a class="nav-link" href="#">Features</a></li>
                  <li class="nav-item"><a class="nav-link" href="#">Problems</a></li>
                  <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                  <li class="nav-item"><a class="nav-link" href="#">Login</a></li>
                  <li class="nav-item"><a class="btn btn-glow" href="#">Get Started</a></li>
                </ul>
              </div>
            </div>
          </nav>
          
          <div class="hero-section text-center text-light">
            <h1 class="hero-heading">
                <span class="word-master">Master</span>
                <span class="word-code">Code.</span>
                <span class="word-conquer">Conquer</span>
                <span class="word-challenges">Challenges.</span>
              </h1>
              
            <p class="hero-subtext">
              Practice coding problems, compete in quizzes, debug like a pro, and climb the leaderboard.<br>
              Your journey to coding mastery starts here.
            </p>
            <div class="mt-4">
              <a href="#" class="btn btn-glow-1 me-3">Start Coding Now</a>
              <a href="#" class="btn btn-outline-light">Explore Problems</a>
            </div>
          </div>
          
          
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
