<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena | Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a2e 10%, #000 35%);
            color: #cfcfe6;
        }

        /* Card */
        .auth-card {
            width: 100%;
            max-width: 420px;
            background: #0f0f1a;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, .7), 0 0 22px rgba(88, 166, 255, .25);
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 24px;
        }

        .brand h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb, #a084f5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .brand small {
            color: #8b8bb3;
        }

        /* Tabs */
        .nav-tabs {
            border-bottom: 1px solid #22224a;
            margin-bottom: 20px;
        }

        .nav-tabs .nav-link {
            flex: 1;
            border: none;
            font-weight: 600;
            color: #8b8bb3;
            background: transparent;
        }

        .nav-tabs .nav-link.active {
            color: #20c997;
            border-bottom: 2px solid #20c997;
        }

        /* Inputs */
        .form-control {
            background: #14142b;
            border: 1px solid #2b2b55;
            color: #e0e0ff;
            padding: 12px;
        }


        .form-control:focus {
            background: #14142b;
            border-color: #20c997;
            box-shadow: 0 0 0 .15rem rgba(32, 201, 151, .25);
            color: #fff;
        }

        .form-control::placeholder {
            color: #b6b6d8;
            /* clearly visible but soft */
            opacity: 1;
        }

        /* Buttons */
        .btn-glow {
            background: linear-gradient(90deg, #20c997, #4e54c8, #8f94fb);
            border: none;
            font-weight: 600;
            color: #fff;
        }

        .btn-glow:hover {
            box-shadow: 0 0 14px rgba(160, 132, 245, .6);
        }

        /* Links */
        .small-link {
            color: #20c997;
            text-decoration: none;
        }

        .small-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 576px) {
            body {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <!-- Brand -->
        <div class="brand">
            <h3>CodeArena</h3>
            <small>Code. Compete. Conquer.</small>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login">Login</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#signup">Sign Up</button>
            </li>
        </ul>

        <!-- Forms -->
        <div class="tab-content">
            <!-- Login -->
            <div class="tab-pane fade show active" id="login">
                <form class="mt-3">
                    <input class="form-control mb-3" placeholder="Email or Username" required>
                    <input type="password" class="form-control mb-3" placeholder="Password" required>
                    <button class="btn btn-glow w-100 mb-3">Login</button>
                    <div class="text-center">
                        <a href="#" class="small-link small">Forgot password?</a>
                    </div>
                </form>
            </div>

            <!-- Signup -->
            <div class="tab-pane fade" id="signup">
                <form class="mt-3">
                    <input class="form-control mb-3" placeholder="Username" required>
                    <input type="email" class="form-control mb-3" placeholder="Email" required>
                    <input type="password" class="form-control mb-3" placeholder="Password" required>
                    <button class="btn btn-glow w-100">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
